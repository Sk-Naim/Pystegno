<!DOCTYPE html>
<html>
<head>
    <title>Pystegno 🔐</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-animation"></div>

<div class="main-container">

    <h1 class="title">Pystegno 🔐</h1>
    <p class="subtitle">Steganography System</p>

    <div class="card">

        <h2>🧬 Encode Message</h2>
        <form action="/encode" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required class="input"><br>
            <textarea name="message" placeholder="Enter secret message..." class="textarea"></textarea><br>
            <button type="submit" class="btn">Encode & Download</button>
        </form>

        <hr>

        <h2>🔍 Decode Message</h2>
        <form action="/decode" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required class="input"><br>
            <button type="submit" class="btn">Decode</button>
        </form>

        {% if decoded_message %}
        <div class="output">
            <h3>📩 Decoded Message:</h3>
            <p>{{ decoded_message }}</p>
        </div>
        {% endif %}

    </div>

    <footer>
        ⚡ Made by <span>Sk Naimuddin</span>
    </footer>

</div>

</body>
</html>
